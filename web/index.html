<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>307 公車即時動態</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      margin: 0;
      background: #f3f6fb;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: 420px;
      max-width: 100%;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    /* header */
    .header {
      background: #1976ff;
      color: #fff;
      padding: 14px 16px 10px;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .route-badge {
      background: rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 13px;
    }
    .route-number {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .updated-time {
      font-size: 12px;
      opacity: 0.9;
    }

    /* tabs */
    .tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.06);
      border-radius: 999px;
      padding: 3px;
      margin-top: 6px;
    }
    .tab-button {
      flex: 1;
      border: none;
      background: transparent;
      color: #e0ecff;
      font-size: 13px;
      padding: 6px 4px;
      cursor: pointer;
      border-radius: 999px;
      white-space: nowrap;
    }
    .tab-button.active {
      background: #ffffff;
      color: #1976ff;
      font-weight: 600;
    }

    /* list */
    .content {
      padding: 4px 0 8px;
      max-height: 540px;
      overflow-y: auto;
    }
    .stop-row {
      display: grid;
      grid-template-columns: 70px 24px 1fr;
      column-gap: 8px;
      padding: 8px 16px;
      position: relative;
    }
    .stop-row:not(:last-child)::after {
      content: "";
      position: absolute;
      left: 96px;
      top: 32px;
      bottom: -4px;
      width: 2px;
      background: #e0e4f0;
      z-index: 0;
    }

    /* ETA */
    .eta {
      align-self: center;
      min-width: 56px;
      text-align: center;
      font-size: 13px;
      padding: 4px 6px;
      border-radius: 999px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .eta-hot {
      background: #ff4b5c;
      color: #fff;
    }
    .eta-normal {
      background: #f0f3ff;
      color: #444;
      border-color: #d5ddff;
    }
    .eta-other {
      background: #eee;
      color: #777;
    }

    /* timeline */
    .timeline {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1976ff;
      border: 2px solid #ffffff;
      box-shadow: 0 0 0 2px #e0e4f0;
    }

    /* stop info */
    .stop-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .stop-name {
      font-size: 15px;
    }
    .stop-sub {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .empty-text {
      padding: 16px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-top">
        <div>
          <div class="route-badge">市區公車</div>
          <div class="route-number" id="route-title">307</div>
        </div>
        <div class="updated-time" id="updated-time">更新中...</div>
      </div>

      <div class="tabs" id="direction-tabs">
      </div>
    </div>

    <div class="content" id="stop-list">
      <!-- JS 產生站牌列表 -->
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);

    let ROUTE = params.get("route") || "307";

    function updateJsonPaths() {
        window.BUS_JSON_URL = `../data/${ROUTE}_bus.json`;
        window.STOP_INFO_URL = `../data/${ROUTE}_bus_stop_info.json`;
    }
    updateJsonPaths();

    let stopInfo = [];       
    let etaMap = new Map(); 
    let currentDirection = 0;

    async function loadInitialData() {
      const [etaRes, stopRes] = await Promise.all([
        fetch(BUS_JSON_URL + "?t=" + Date.now()),
        fetch(STOP_INFO_URL + "?t=" + Date.now())
      ]);

      const etaJson = await etaRes.json();
      const stopJson = await stopRes.json();

      stopInfo = stopJson || [];
      buildEtaMap(etaJson.data || []);

      updateRouteTitle(stopJson);
      updateTimeText(etaJson.timestamp);
      initDirectionTabs();
      renderDirection(currentDirection);
    }

    function buildEtaMap(list) {
      etaMap.clear();
      list.forEach(item => {
        const key = item.StopUID + "_" + item.Direction;
        etaMap.set(key, item);
      });
    }

    function updateRouteTitle(stopJson) {
      if (!Array.isArray(stopJson) || stopJson.length === 0) return;
      const first = stopJson[0];
      const routeName = first.RouteName?.Zh_tw || "路線";
      document.getElementById("route-title").textContent = routeName;
    }

    function updateTimeText(ts) {
      if (!ts) return;
      const d = new Date(ts);
      const text = "更新：" + d.toLocaleTimeString("zh-TW", { hour12: false });
      document.getElementById("updated-time").textContent = text;
    }

    function initDirectionTabs() {
        const container = document.getElementById("direction-tabs");
        container.innerHTML = "";

        if (!Array.isArray(stopInfo) || stopInfo.length === 0) {
            container.innerHTML = "<div style='color:#fff;font-size:13px;'>無路線資料</div>";
            return;
        }

        const directions = [...new Set(stopInfo.map(r => r.Direction))].sort();
        currentDirection = directions[0];

        directions.forEach(dir => {
            const route = stopInfo.find(r => r.Direction === dir);
            const stops = route?.Stops || [];

            let firstStop = "--";
            let lastStop = "--";

            if (stops.length > 0) {
            firstStop = stops[0].StopName.Zh_tw;
            lastStop = stops[stops.length - 1].StopName.Zh_tw;
            }

            const routeName = route?.RouteName?.Zh_tw || "";

            const label = `${firstStop}→${lastStop}`;

            const btn = document.createElement("button");
            btn.className = "tab-button";
            btn.dataset.dir = dir;
            btn.textContent = label;

            btn.addEventListener("click", () => {
            currentDirection = dir;
            updateTabActive();
            renderDirection(dir);
            });

            container.appendChild(btn);
        });

        updateTabActive();
    }


    function updateTabActive() {
      document.querySelectorAll(".tab-button").forEach(btn => {
        const dir = Number(btn.dataset.dir);
        btn.classList.toggle("active", dir === Number(currentDirection));
      });
    }

    function renderDirection(dir) {
      dir = Number(dir);
      const listEl = document.getElementById("stop-list");
      listEl.innerHTML = "";

      const route = stopInfo.find(r => r.Direction === dir);
      if (!route) {
        listEl.innerHTML = "<div class='empty-text'>找不到此方向的路線資料</div>";
        return;
      }

      const stops = (route.Stops || []).slice().sort((a, b) => a.StopSequence - b.StopSequence);

      if (stops.length === 0) {
        listEl.innerHTML = "<div class='empty-text'>此方向尚無站牌資料</div>";
        return;
      }

      stops.forEach(stop => {
        const key = stop.StopUID + "_" + dir;
        const eta = etaMap.get(key);

        let label = "--";
        let labelClass = "eta-normal";

        if (!eta) {
          label = "--";
          labelClass = "eta-other";
        } else if (eta.StopStatus !== 0) {
          switch (eta.StopStatus) {
            case 1: label = "未發車"; break;
            case 2: label = "交管不停"; break;
            case 3: label = "末班已過"; break;
            case 4: label = "今日未營運"; break;
            default: label = "狀態異常";
          }
          labelClass = "eta-other";
        } else {
          const sec = eta.EstimateTime;
          if (sec <= 60) {
            label = "進站中";
            labelClass = "eta-hot";
          } else {
            const min = Math.round(sec / 60);
            label = min + " 分";
            labelClass = min <= 3 ? "eta-hot" : "eta-normal";
          }
        }

        const row = document.createElement("div");
        row.className = "stop-row";
        row.innerHTML = `
          <div class="eta ${labelClass}">${label}</div>
          <div class="timeline">
            <div class="dot"></div>
          </div>
          <div class="stop-info">
            <div class="stop-name">${stop.StopName.Zh_tw}</div>
            <div class="stop-sub">${stop.StopName.En || ""}</div>
          </div>
        `;
        listEl.appendChild(row);
      });
    }

    async function refreshEtaLoop() {
      try {
        const res = await fetch(BUS_JSON_URL + "?t=" + Date.now());
        const json = await res.json();
        buildEtaMap(json.data || []);
        updateTimeText(json.timestamp);
        renderDirection(currentDirection);
      } catch (err) {
        console.error("刷新 ETA 失敗", err);
      }
    }

    loadInitialData();
    setInterval(refreshEtaLoop, 15000); // 每 15 秒更新一次
  </script>
</body>
</html>
